<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuro - Agents</title>
    <link rel="stylesheet" href="/static/css/variables.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/components.css">
</head>
<body class="page-scroll">
    <nav id="main-nav"></nav>

    <div class="dashboard" id="dashboard">
        <div class="loading" id="loading" data-i18n="agents.loading">Loading agents data</div>
    </div>

    <!-- Create/Edit Instance Modal -->
    <div class="modal-overlay" id="instance-modal" style="display:none">
        <div class="modal" style="max-width:600px">
            <h3 id="modal-title" data-i18n="agents.createInstance">Create Agent Instance</h3>
            <input type="hidden" id="edit-instance-id">

            <div class="form-group">
                <label data-i18n="agents.instanceId">Instance ID</label>
                <input type="text" id="edit-id" placeholder="e.g. customer-service">
            </div>

            <div class="form-group">
                <label data-i18n="agents.instanceName">Display Name</label>
                <input type="text" id="edit-name" placeholder="e.g. Customer Service Bot">
            </div>

            <div class="form-group">
                <label data-i18n="agents.model">Model</label>
                <input type="text" id="edit-model" placeholder="(inherit from main)">
            </div>

            <div class="form-group">
                <label data-i18n="agents.temperature">Temperature</label>
                <input type="number" id="edit-temperature" step="0.1" min="0" max="2" placeholder="(inherit)">
            </div>

            <div class="form-group">
                <label data-i18n="agents.personalityMode">Personality Mode</label>
                <select id="edit-personality-mode">
                    <option value="independent">Independent</option>
                    <option value="shared">Shared (use main)</option>
                </select>
            </div>

            <div class="form-group">
                <label data-i18n="agents.memoryMode">Memory Mode</label>
                <select id="edit-memory-mode">
                    <option value="independent">Independent</option>
                    <option value="shared">Shared (use main)</option>
                    <option value="linked">Linked (share longterm)</option>
                </select>
            </div>

            <div class="form-group" id="linked-agents-group" style="display:none">
                <label data-i18n="agents.linkedAgents">Linked Agent IDs</label>
                <input type="text" id="edit-linked-agents" placeholder="comma-separated IDs">
            </div>

            <div class="form-group">
                <label data-i18n="agents.botAdapter">Bot Adapter</label>
                <select id="edit-bot-adapter">
                    <option value="">None</option>
                    <option value="discord">Discord</option>
                    <option value="telegram">Telegram</option>
                    <option value="slack">Slack</option>
                    <option value="line">LINE</option>
                    <option value="email">Email</option>
                </select>
            </div>

            <div class="form-group" id="bot-token-group" style="display:none">
                <label data-i18n="agents.botTokenEnv">Bot Token Env Var</label>
                <input type="text" id="edit-bot-token-env" placeholder="e.g. KURO_DISCORD_TOKEN_CS">
            </div>

            <div class="form-group">
                <label data-i18n="agents.systemPrompt">System Prompt</label>
                <textarea id="edit-system-prompt" rows="3" placeholder="(inherit from main)"></textarea>
            </div>

            <div class="modal-actions">
                <button class="btn" id="modal-cancel" data-i18n="common.cancel">Cancel</button>
                <button class="btn btn-primary" id="modal-save" data-i18n="common.save">Save</button>
            </div>
        </div>
    </div>

    <!-- Personality Editor Modal -->
    <div class="modal-overlay" id="personality-modal" style="display:none">
        <div class="modal" style="max-width:600px">
            <h3 id="personality-title">Edit Personality</h3>
            <input type="hidden" id="personality-instance-id">
            <div class="form-group">
                <textarea id="personality-content" rows="12" style="font-family:monospace;font-size:0.85rem"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn" id="personality-cancel" data-i18n="common.cancel">Cancel</button>
                <button class="btn btn-primary" id="personality-save" data-i18n="common.save">Save</button>
            </div>
        </div>
    </div>

    <!-- Sub-Agent Modal -->
    <div class="modal-overlay" id="subagent-modal" style="display:none">
        <div class="modal" style="max-width:500px">
            <h3 data-i18n="agents.addSubAgent">Add Sub-Agent</h3>
            <input type="hidden" id="subagent-instance-id">

            <div class="form-group">
                <label data-i18n="agents.subAgentName">Name</label>
                <input type="text" id="subagent-name" placeholder="e.g. researcher">
            </div>

            <div class="form-group">
                <label data-i18n="agents.model">Model</label>
                <input type="text" id="subagent-model" placeholder="e.g. ollama/qwen3:32b">
            </div>

            <div class="form-group">
                <label data-i18n="agents.systemPrompt">System Prompt</label>
                <textarea id="subagent-system-prompt" rows="3" placeholder="Agent instructions..."></textarea>
            </div>

            <div class="form-group">
                <label data-i18n="agents.maxToolRounds">Max Tool Rounds</label>
                <input type="number" id="subagent-max-rounds" value="5" min="1" max="50">
            </div>

            <div class="modal-actions">
                <button class="btn" id="subagent-cancel" data-i18n="common.cancel">Cancel</button>
                <button class="btn btn-primary" id="subagent-save" data-i18n="common.save">Save</button>
            </div>
        </div>
    </div>

    <script type="module" src="/static/js/agents.js"></script>
</body>
</html>
