<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuro - Agents</title>
    <link rel="stylesheet" href="/static/css/variables.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/panel-shell.css">
    <link rel="stylesheet" href="/static/css/agents.css">
</head>
<body class="page-scroll">
    <nav id="main-nav"></nav>

    <div class="panel-shell">
        <aside id="panel-nav" class="panel-nav"></aside>
        <main class="panel-main">
            <div class="dashboard" id="dashboard">
                <div class="loading" id="loading" data-i18n="agents.loading">Loading agents data</div>
            </div>
        </main>
    </div>

    <!-- Create/Edit Instance Modal -->
    <div class="modal-overlay" id="instance-modal" style="display:none">
        <div class="modal" style="max-width:600px">
            <h3 id="modal-title" data-i18n="agents.createInstance">Create Agent Instance</h3>
            <input type="hidden" id="edit-instance-id">
            <div id="instance-form-root"></div>

            <div class="modal-actions">
                <button class="btn" id="modal-cancel" data-i18n="common.cancel">Cancel</button>
                <button class="btn btn-primary" id="modal-save" data-i18n="common.save">Save</button>
            </div>
        </div>
    </div>

    <!-- Personality Editor Modal -->
    <div class="modal-overlay" id="personality-modal" style="display:none">
        <div class="modal" style="max-width:600px">
            <h3 id="personality-title">Edit Personality</h3>
            <input type="hidden" id="personality-instance-id">
            <div class="form-group">
                <textarea id="personality-content" rows="12" style="font-family:monospace;font-size:0.85rem"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn" id="personality-cancel" data-i18n="common.cancel">Cancel</button>
                <button class="btn btn-primary" id="personality-save" data-i18n="common.save">Save</button>
            </div>
        </div>
    </div>

    <!-- Sub-Agent Modal -->
    <div class="modal-overlay" id="subagent-modal" style="display:none">
        <div class="modal" style="max-width:500px">
            <h3 id="subagent-title" data-i18n="agents.addSubAgent">Add Sub-Agent</h3>
            <input type="hidden" id="subagent-instance-id">
            <input type="hidden" id="subagent-original-name">
            <div id="subagent-form-root"></div>

            <div class="modal-actions">
                <button class="btn" id="subagent-cancel" data-i18n="common.cancel">Cancel</button>
                <button class="btn btn-primary" id="subagent-save" data-i18n="common.save">Save</button>
            </div>
        </div>
    </div>

    <script type="module" src="/static/js/agents.js"></script>
</body>
</html>
