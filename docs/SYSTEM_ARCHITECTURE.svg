<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180">
  <defs>
    <style>
      .title { font: 700 36px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .group-title { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #374151; letter-spacing: 0.5px; }
      .box-in { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 12; ry: 12; }
      .box-adapter { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 12; ry: 12; }
      .box-core { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.5; rx: 14; ry: 14; }
      .box-runtime { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 12; ry: 12; }
      .box-model { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 12; ry: 12; }
      .box-storage { fill: #faf5ff; stroke: #9333ea; stroke-width: 2; rx: 12; ry: 12; }
      .txt { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .small { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .edge { stroke: #4b5563; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .edge-bi { stroke: #334155; stroke-width: 2.2; fill: none; marker-start: url(#arrow-bi); marker-end: url(#arrow-bi); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#4b5563"/>
    </marker>
    <marker id="arrow-bi" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1800" height="1180" fill="#ffffff"/>
  <text x="40" y="56" class="title">OpenKuro System Architecture (Current)</text>
  <text x="40" y="86" class="subtitle">Includes Discord/Web/CLI adapter flow, engine orchestration, models, runtime, and persistence</text>

  <text x="40" y="128" class="group-title">EXTERNAL CHANNELS</text>
  <text x="360" y="128" class="group-title">ADAPTER LAYER</text>
  <text x="760" y="228" class="group-title">CORE</text>
  <text x="1160" y="238" class="group-title">MODEL GATEWAY</text>
  <text x="760" y="540" class="group-title">RUNTIME / MEMORY</text>
  <text x="1520" y="128" class="group-title">MODEL PROVIDERS</text>

  <!-- External channels -->
  <rect class="box-in" x="40" y="140" width="250" height="80"/>
  <text class="txt" x="66" y="174">Discord (Guild / Thread / DM)</text>
  <text class="small" x="66" y="198">User message + attachments</text>

  <rect class="box-in" x="40" y="250" width="250" height="80"/>
  <text class="txt" x="66" y="284">Telegram / Slack / LINE / Email</text>
  <text class="small" x="66" y="308">Incoming adapter events</text>

  <rect class="box-in" x="40" y="360" width="250" height="80"/>
  <text class="txt" x="66" y="394">Web UI</text>
  <text class="small" x="66" y="418">FastAPI + WebSocket chat</text>

  <rect class="box-in" x="40" y="470" width="250" height="80"/>
  <text class="txt" x="66" y="504">CLI</text>
  <text class="small" x="66" y="528">Terminal command/session</text>

  <!-- Adapter layer -->
  <rect class="box-adapter" x="360" y="140" width="300" height="80"/>
  <text class="txt" x="386" y="174">DiscordAdapter</text>
  <text class="small" x="386" y="198">channels, threads, uploads</text>

  <rect class="box-adapter" x="360" y="250" width="300" height="80"/>
  <text class="txt" x="386" y="284">Messaging Adapters</text>
  <text class="small" x="386" y="308">telegram/slack/line/email</text>

  <rect class="box-adapter" x="360" y="360" width="300" height="80"/>
  <text class="txt" x="386" y="394">WebAdapter</text>
  <text class="small" x="386" y="418">ws events + approvals + i18n</text>

  <rect class="box-adapter" x="360" y="470" width="300" height="80"/>
  <text class="txt" x="386" y="504">CLIAdapter</text>
  <text class="small" x="386" y="528">slash commands + streaming</text>

  <!-- Core -->
  <rect class="box-core" x="760" y="250" width="320" height="240"/>
  <text class="txt" x="786" y="292">Engine.process_message</text>
  <text class="small" x="786" y="318">context build + tool orchestration</text>
  <text class="small" x="786" y="342">approval guard + fallback chain</text>
  <text class="small" x="786" y="366">session locks + adapter response</text>
  <text class="small" x="786" y="390">streaming/tool call dispatch</text>

  <!-- Model gateway -->
  <rect class="box-model" x="1160" y="260" width="300" height="140"/>
  <text class="txt" x="1188" y="296">Model Gateway / Router</text>
  <text class="small" x="1188" y="321">provider select + auth mode</text>
  <text class="small" x="1188" y="345">API / OAuth / local endpoint</text>
  <text class="small" x="1188" y="369">retry + fallback order</text>

  <!-- Runtime + memory -->
  <rect class="box-runtime" x="760" y="550" width="320" height="130"/>
  <text class="txt" x="786" y="586">Memory Stack</text>
  <text class="small" x="786" y="610">working + history.db + long-term RAG</text>
  <text class="small" x="786" y="634">lessons injection + compression</text>

  <rect class="box-runtime" x="1160" y="550" width="300" height="130"/>
  <text class="txt" x="1188" y="586">Tool / Skill / MCP Runtime</text>
  <text class="small" x="1188" y="610">built-in tools + skills</text>
  <text class="small" x="1188" y="634">MCP bridge + plugins (e.g. ComfyUI)</text>

  <rect class="box-runtime" x="760" y="730" width="320" height="120"/>
  <text class="txt" x="786" y="766">Agent Orchestration</text>
  <text class="small" x="786" y="790">main/sub-agent + teams + A2A</text>
  <text class="small" x="786" y="814">instance memory mode controls</text>

  <rect class="box-runtime" x="1160" y="730" width="300" height="120"/>
  <text class="txt" x="1188" y="766">Scheduler + Notifications</text>
  <text class="small" x="1188" y="790">cron tasks + proactive pushes</text>
  <text class="small" x="1188" y="814">discord/telegram result delivery</text>

  <!-- Persistence -->
  <rect class="box-storage" x="760" y="900" width="700" height="150"/>
  <text class="txt" x="788" y="938">Persistence / Files</text>
  <text class="small" x="788" y="964">~/.kuro/config.yaml, personality.md, agents/*</text>
  <text class="small" x="788" y="988">~/.kuro/history.db, memory/MEMORY.md, vector_store/</text>
  <text class="small" x="788" y="1012">~/.kuro/action_logs/*.jsonl, memory/lessons.json, oauth session cache</text>

  <!-- Providers -->
  <rect class="box-model" x="1520" y="140" width="220" height="72"/>
  <text class="txt" x="1544" y="174">OpenAI</text>
  <text class="small" x="1544" y="196">API + OAuth</text>

  <rect class="box-model" x="1520" y="240" width="220" height="72"/>
  <text class="txt" x="1544" y="274">Gemini / Anthropic</text>
  <text class="small" x="1544" y="296">cloud providers</text>

  <rect class="box-model" x="1520" y="340" width="220" height="72"/>
  <text class="txt" x="1544" y="374">Local Endpoints</text>
  <text class="small" x="1544" y="396">Ollama / llama.cpp / vLLM</text>

  <rect class="box-model" x="1520" y="440" width="220" height="72"/>
  <text class="txt" x="1544" y="474">Fallback Chain</text>
  <text class="small" x="1544" y="496">ordered failover</text>

  <!-- Bidirectional channel/adapters -->
  <path class="edge-bi" d="M290 180 H360"/>
  <path class="edge-bi" d="M290 290 H360"/>
  <path class="edge-bi" d="M290 400 H360"/>
  <path class="edge-bi" d="M290 510 H360"/>

  <!-- Bidirectional adapters/core -->
  <path class="edge-bi" d="M660 180 H700 V300 H760"/>
  <path class="edge-bi" d="M660 290 H760"/>
  <path class="edge-bi" d="M660 400 H760"/>
  <path class="edge-bi" d="M660 510 H700 V460 H760"/>

  <!-- Core to gateway/providers -->
  <path class="edge-bi" d="M1080 330 H1160"/>
  <path class="edge-bi" d="M1460 302 C1492 255,1498 212,1520 176"/>
  <path class="edge-bi" d="M1460 322 C1498 304,1500 290,1520 276"/>
  <path class="edge-bi" d="M1460 342 C1498 360,1500 366,1520 376"/>
  <path class="edge-bi" d="M1460 360 C1492 420,1498 450,1520 476"/>

  <!-- Core to runtime -->
  <path class="edge-bi" d="M920 490 V550"/>
  <path class="edge-bi" d="M1080 430 H1120 V590 H1160"/>
  <path class="edge-bi" d="M820 490 H730 V760 H760"/>
  <path class="edge-bi" d="M1080 460 H1120 V790 H1160"/>

  <!-- Runtime to persistence -->
  <path class="edge" d="M920 680 V705 H730 V900 H820"/>
  <path class="edge" d="M1310 680 V705 H1490 V900 H1400"/>
  <path class="edge" d="M920 850 V900"/>
  <path class="edge" d="M1310 850 V900"/>
</svg>
